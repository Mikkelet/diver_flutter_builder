name: diver_flutter_builder_example
description: >-
  Example Flutter app that wires up go_router typed routes and runs
  diver_flutter_builder to aggregate them into diver/app_urls.json.
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.11.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.0.0
  diver_flutter_annotation:
    path: ../../diver_flutter_annotation

dev_dependencies:
  build_runner: ^2.4.0
  go_router_builder: ^4.2.0
  diver_flutter_builder:
    path: ../

flutter:
  uses-material-design: true
