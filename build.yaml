targets:
  $default:
    builders:
      diver_flutter_builder|url_aggregator:
        enabled: true

builders:
  url_aggregator:
    import: "package:diver_flutter_annotations/builder.dart"
    builder_factories: ["urlAggregatorBuilder"]
    build_extensions:
      $lib$:
        - "app_urls.json"
    auto_apply: dependents
    build_to: source
    required_inputs:
      - ".dart"
